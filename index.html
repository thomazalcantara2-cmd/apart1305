<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel de Relatórios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/intro.js/minified/introjs.min.css" />
    <script src="https://unpkg.com/intro.js/minified/intro.min.js"></script>
    <style>
      /* --- NEW DESIGN SYSTEM --- */
      :root {
        --slate-50: #f8fafc;
        --slate-100: #f1f5f9;
        --slate-200: #e2e8f0;
        --slate-300: #cbd5e1;
        --slate-400: #94a3b8;
        --slate-500: #64748b;
        --slate-600: #475569;
        --slate-700: #334155;
        --slate-800: #1e293b;
        --slate-900: #0f172a;
        --blue-500: #3b82f6;
        --blue-600: #2563eb;
      }
      body {
        background-color: var(--slate-100);
        font-family: Inter, sans-serif;
        color: var(--slate-700);
      }
      .dark body {
        background-color: var(--slate-900);
        color: var(--slate-300);
      }
      .card {
        background-color: #ffffff;
        border-radius: 0.5rem;
        border: 1px solid var(--slate-200);
        box-shadow: none;
      }
      .dark .card {
        background-color: var(--slate-800);
        border-color: var(--slate-700);
      }

      /* Table Styles */
      table {
        width: 100%;
        font-size: 0.875rem;
      }
      table thead th {
        padding: 0.625rem 1rem;
        border-bottom: 1px solid var(--slate-200);
        text-align: left;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        color: var(--slate-400);
        letter-spacing: 0.06em;
        background-color: var(--slate-50);
      }
      .dark table thead th {
        border-bottom-color: var(--slate-700);
        color: var(--slate-500);
        background-color: rgba(255,255,255,0.03);
      }
      table:not(.no-zebra) tbody tr:nth-child(even) {
        background-color: transparent;
      }
      .dark table:not(.no-zebra) tbody tr:nth-child(even) {
        background-color: transparent;
      }
      table tbody tr:hover {
        background-color: var(--slate-50);
      }
      .dark table tbody tr:hover {
        background-color: rgba(255,255,255,0.03);
      }
      table td {
        padding: 0.625rem 1rem;
        border-bottom: 1px solid var(--slate-100);
      }
      .dark table td {
        border-bottom-color: rgba(255,255,255,0.05);
      }
      
      /* --- Custom Intro.js Styles (Legacy, kept for compatibility) --- */
      .introjs-tooltip {
        background-color: #ffffff; border-radius: 12px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15), 0 5px 10px rgba(0, 0, 0, 0.1); padding: 20px; max-width: 350px; font-family: 'Inter', sans-serif; color: #374151;
      }
      .introjs-tooltip-header { padding: 0; margin-bottom: 12px; }
      .introjs-tooltip-title { font-size: 1.125rem; font-weight: 700; color: #1f2937; }
      .introjs-tooltiptext { font-size: 0.9rem; line-height: 1.6; }
      .introjs-button { background-color: #3b82f6; color: white; border: none; border-radius: 8px; padding: 8px 16px; font-weight: 600; text-shadow: none; transition: background-color 0.2s ease; }
      .introjs-button:hover { background-color: #2563eb; }
      .introjs-prevbutton { background-color: #e5e7eb; color: #374151; }
      .introjs-prevbutton:hover { background-color: #d1d5db; }
      .introjs-donebutton { background-color: #10b981; }
      .introjs-donebutton:hover { background-color: #059669; }
      .introjs-skipbutton { position: absolute; top: 12px; right: 12px; color: #6b7280; font-size: 1.5rem; line-height: 1; padding: 2px; text-decoration: none; }
      .introjs-progress { background-color: #e5e7eb; height: 8px; border-radius: 4px; margin-top: 15px; }
      .introjs-progressbar { background-color: #3b82f6; border-radius: 4px; }
      .introjs-arrow.top { border-bottom-color: #ffffff; }
      .introjs-arrow.bottom { border-top-color: #ffffff; }
      .introjs-arrow.left { border-right-color: #ffffff; }
      .introjs-arrow.right { border-left-color: #ffffff; }
      .introjs-overlay { background-color: #1f2937; opacity: 0.7; }
      .dark .introjs-tooltip { background-color: #1f2937; color: #d1d5db; border: 1px solid #374151; }
      .dark .introjs-tooltip-title { color: #f9fafb; }
      .dark .introjs-button { background-color: #2563eb; }
      .dark .introjs-button:hover { background-color: #1d4ed8; }
      .dark .introjs-prevbutton { background-color: #374151; color: #d1d5db; }
      .dark .introjs-prevbutton:hover { background-color: #4b5563; }
      .dark .introjs-donebutton { background-color: #059669; }
      .dark .introjs-donebutton:hover { background-color: #047857; }
      .dark .introjs-skipbutton { color: #9ca3af; }
      .dark .introjs-progress { background-color: #4b5563; }
      .dark .introjs-progressbar { background-color: #3b82f6; }
      .dark .introjs-arrow.top { border-bottom-color: #1f2937; }
      .dark .introjs-arrow.bottom { border-top-color: #1f2937; }
      .dark .introjs-arrow.left { border-right-color: #1f2937; }
      .dark .introjs-arrow.right { border-left-color: #1f2937; }
      .dark .introjs-overlay { background-color: #000000; opacity: 0.8; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",

  }
}
</script>

</head>

</html>
